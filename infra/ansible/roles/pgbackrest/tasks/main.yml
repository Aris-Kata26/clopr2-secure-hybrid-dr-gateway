---
# tasks/main.yml — pgBackRest installation and configuration
# CLOPR2 Secure Hybrid DR Gateway | Owner: KATAR711 | Team: BCLC24
#
# IDEMPOTENT: safe to re-run. Modifies postgresql.conf; restarts PostgreSQL.
# REQUIRES:
#   - pgbackrest_repo_azure_key: set via ansible-vault or extra-vars
#   - PostgreSQL already installed and running
#   - Azure Blob Storage account and container already created (backup.tf)

- name: Install pgBackRest
  ansible.builtin.apt:
    name: pgbackrest
    state: present
    update_cache: true

- name: Create pgBackRest config directory
  ansible.builtin.file:
    path: /etc/pgbackrest
    state: directory
    owner: root
    group: postgres
    mode: "0750"

- name: Create pgBackRest log directory
  ansible.builtin.file:
    path: "{{ pgbackrest_log_path }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"

- name: Write pgbackrest.conf
  ansible.builtin.template:
    src: pgbackrest.conf.j2
    dest: /etc/pgbackrest/pgbackrest.conf
    owner: root
    group: postgres
    mode: "0640"
  notify: Restart PostgreSQL

- name: Enable WAL archiving in postgresql.conf
  ansible.builtin.lineinfile:
    path: /etc/postgresql/16/main/postgresql.conf
    regexp: "^archive_mode"
    line: "archive_mode = on"
    state: present
  notify: Restart PostgreSQL

- name: Set archive_command in postgresql.conf
  ansible.builtin.lineinfile:
    path: /etc/postgresql/16/main/postgresql.conf
    regexp: "^archive_command"
    line: "archive_command = 'pgbackrest --stanza={{ pgbackrest_stanza }} archive-push %p'"
    state: present
  notify: Restart PostgreSQL

- name: Flush handlers (apply PostgreSQL restart before stanza-create)
  ansible.builtin.meta: flush_handlers

- name: Initialize pgBackRest stanza
  ansible.builtin.command:
    cmd: "pgbackrest --stanza={{ pgbackrest_stanza }} stanza-create"
  become: true
  become_user: postgres
  register: stanza_result
  changed_when: "'stanza-create for stanza' in stanza_result.stdout"
  failed_when:
    - stanza_result.rc != 0
    - "'already exists' not in stanza_result.stderr"

- name: Verify pgBackRest can archive WAL (check)
  ansible.builtin.command:
    cmd: "pgbackrest --stanza={{ pgbackrest_stanza }} check"
  become: true
  become_user: postgres
  register: check_result
  changed_when: false
  failed_when: check_result.rc != 0

- name: Show pgBackRest check output
  ansible.builtin.debug:
    var: check_result.stdout_lines
