[pg_primary]
pg-primary ansible_host=10.0.96.11 ansible_user=katar711 ansible_ssh_private_key_file=~/.ssh/id_ed25519_dr_onprem ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new -o ProxyCommand="ssh -W %h:%p -i ~/.ssh/id_ed25519_dr_pve -o StrictHostKeyChecking=accept-new root@10.0.10.71"'

[pg_standby]
pg-standby ansible_host=10.0.96.14

[app_onprem]
app-onprem ansible_host=10.0.96.13 ansible_ssh_private_key_file=~/.ssh/id_ed25519_dr_onprem ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new -o ProxyCommand="ssh -W %h:%p -i ~/.ssh/id_ed25519_dr_pve -o StrictHostKeyChecking=accept-new root@10.0.10.71"'

[pg_dr]
# ── PHASE 1: Bootstrap (before WireGuard tunnel exists) ──────────────────────
# Use this line first. Replace <PG_DR_WG_PUBLIC_IP> with:
#   cd infra/terraform/envs/dr-fce && terraform output pg_dr_wg_public_ip
#
# vm-pg-dr ansible_host=20.216.128.32 ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_ed25519_dr ansible_ssh_common_args='-o StrictHostKeyChecking=no'
#
# ── PHASE 2: Post-WireGuard (permanent, tunnel via ProxyJump) ─────────────────
# Uses ~/.ssh/dr_tunnel.cfg which defines the 3-hop ProxyJump chain:
#   WSL → Proxmox (10.0.10.71) → pg-primary (10.0.96.11) → DR VM (10.200.0.2)
# ansible_host must match the Host alias in dr_tunnel.cfg
vm-pg-dr ansible_host=dr-tunnel ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_ed25519_dr ansible_ssh_common_args='-F /home/aris/.ssh/dr_tunnel.cfg -o StrictHostKeyChecking=no'

[pg_nodes:children]
pg_primary
pg_standby

[wg_nodes:children]
pg_primary
pg_dr

[onprem:children]
pg_primary
pg_standby
app_onprem

# vm-pg-dr SSH path has two phases — see [pg_dr] section comments above.
# Run scripts/wg-keygen.sh and terraform apply before using the pg_dr group.

# ── DR onboarding groups (additive — no existing group affected) ──────────────
# Source of truth: dr-inventory.yml (repo root)
# Classifier:      scripts/dr/classify-vm.sh
# Policy:          docs/07-dr-onboarding/00-policy-model.md
#
# dr_managed  — VMs with dr_managed:true in dr-inventory.yml
#               These VMs have an active or planned Azure-side DR path.
# dr_excluded — VMs with dr_managed:false or role=management.
#               Explicitly outside DR governance.
#
# NOTE: Ansible group membership here mirrors dr-inventory.yml but does NOT
# override it. The manifest is the authority. These groups are for readability
# and future playbook targeting only. Do not run DR playbooks against these
# groups without reviewing dr-inventory.yml first.

[dr_managed:children]
pg_primary
app_onprem

[dr_excluded:children]
pg_standby

# mgmt-jump is not in any inventory group (no static IP, on_boot=false).
# It remains management-only and is never a target for DR playbooks.
