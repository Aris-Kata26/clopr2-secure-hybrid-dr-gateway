---
# All commands use root (become: true set at play level)

- name: Install WireGuard
  apt:
    name: wireguard
    state: present
    update_cache: true

- name: Ensure WireGuard key directory exists
  file:
    path: "{{ wg_key_dir }}"
    state: directory
    mode: "0700"
    owner: root
    group: root

- name: Write WireGuard private key
  copy:
    content: "{{ wg_privkey }}\n"
    dest: "{{ wg_key_dir }}/privatekey"
    mode: "0600"
    owner: root
    group: root
  no_log: true

- name: Derive and write public key
  shell: "wg pubkey < {{ wg_key_dir }}/privatekey > {{ wg_key_dir }}/publickey"
  args:
    creates: "{{ wg_key_dir }}/publickey"

- name: Fix public key permissions
  file:
    path: "{{ wg_key_dir }}/publickey"
    mode: "0644"
    owner: root
    group: root

- name: Deploy wg0.conf
  template:
    src: wg0.conf.j2
    dest: "{{ wg_key_dir }}/{{ wg_iface }}.conf"
    mode: "0600"
    owner: root
    group: root
  notify: restart wireguard

- name: Enable and start WireGuard
  systemd:
    name: "wg-quick@{{ wg_iface }}"
    state: started
    enabled: true

- name: Verify WireGuard interface is up
  command: "wg show {{ wg_iface }}"
  register: wg_status
  changed_when: false
  failed_when: wg_status.rc != 0

- name: Print WireGuard status
  debug:
    msg: "{{ inventory_hostname }} wg status: {{ wg_status.stdout_lines }}"
