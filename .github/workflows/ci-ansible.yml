name: ci-ansible

on:
  push:
  pull_request:

jobs:

  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ansible-lint
        # ansible-core pulled in as a dependency; no need to install full ansible.
        run: pip install ansible-lint
      - name: ansible-lint
        # Targets the whole ansible directory; .ansible-lint at repo root
        # provides skip_list for intentional patterns (fqcn, shell vs command).
        run: ansible-lint infra/ansible
