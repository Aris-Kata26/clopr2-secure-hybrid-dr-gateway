---
# Installs Docker, deploys prototype-a app on app-onprem, starts it via docker compose.
# Idempotent — safe to re-run.
#
# Usage:
#   cd infra/ansible
#   ANSIBLE_ROLES_PATH="$(pwd)/roles" \
#   ANSIBLE_VAULT_PASSWORD_FILE=~/.ansible_vault_pass \
#   ANSIBLE_HOST_KEY_CHECKING=False \
#   ansible-playbook -i inventories/dev/hosts.ini playbooks/app_deploy.yml \
#     -e "app_db_password=AppPass2026"

- name: app_deploy | Install Docker and deploy prototype-a on app-onprem
  hosts: app_onprem
  become: true
  vars:
    app_dir: /opt/clopr2/app
    compose_dir: /opt/clopr2/deploy/docker
    db_host: "10.0.96.10"
    db_port: 5432
    db_name: appdb
    db_user: appuser
    app_env: dev
    app_port: 8000
    host_port: 8080
    # Pass app_db_password via -e flag — never hardcode here
    app_db_password: "{{ app_db_password }}"

  tasks:
    # ── Docker installation ─────────────────────────────────────────────────
    - name: Install Docker prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Create Docker apt keyring directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: false

    - name: Add Docker apt repository
      apt_repository:
        repo: >
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker
        update_cache: true

    - name: Install Docker Engine and Docker Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is running and enabled
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add katar711 to docker group
      user:
        name: katar711
        groups: docker
        append: true

    # ── App file deployment ─────────────────────────────────────────────────
    - name: Create app and compose directories
      file:
        path: "{{ item }}"
        state: directory
        owner: katar711
        group: katar711
        mode: '0755'
      loop:
        - "{{ app_dir }}/src"
        - "{{ compose_dir }}"

    - name: Copy Dockerfile
      copy:
        src: "{{ playbook_dir }}/../../../app/Dockerfile"
        dest: "{{ app_dir }}/Dockerfile"
        owner: katar711
        group: katar711
        mode: '0644'

    - name: Copy requirements.txt
      copy:
        src: "{{ playbook_dir }}/../../../app/requirements.txt"
        dest: "{{ app_dir }}/requirements.txt"
        owner: katar711
        group: katar711
        mode: '0644'

    - name: Copy main.py
      copy:
        src: "{{ playbook_dir }}/../../../app/src/main.py"
        dest: "{{ app_dir }}/src/main.py"
        owner: katar711
        group: katar711
        mode: '0644'

    - name: Write .env with DB credentials and VIP
      copy:
        dest: "{{ app_dir }}/.env"
        owner: katar711
        group: katar711
        mode: '0600'
        content: |
          APP_ENV={{ app_env }}
          APP_PORT={{ app_port }}
          DB_HOST={{ db_host }}
          DB_PORT={{ db_port }}
          DB_NAME={{ db_name }}
          DB_USER={{ db_user }}
          DB_PASSWORD={{ app_db_password }}

    - name: Write docker-compose.yml
      copy:
        dest: "{{ compose_dir }}/docker-compose.yml"
        owner: katar711
        group: katar711
        mode: '0644'
        content: |
          services:
            app:
              build: ../../app
              ports:
                - "{{ host_port }}:{{ app_port }}"
              env_file: ../../app/.env
              restart: unless-stopped
              healthcheck:
                test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:{{ app_port }}/readyz')"]
                interval: 15s
                timeout: 5s
                retries: 3
                start_period: 10s

    # ── Build and start ─────────────────────────────────────────────────────
    - name: Build and start app container
      command: docker compose up -d --build
      args:
        chdir: "{{ compose_dir }}"
      register: compose_up
      changed_when: true

    - name: Show compose output
      debug:
        msg: "{{ compose_up.stdout_lines + compose_up.stderr_lines }}"

    - name: Wait for /readyz to return 200
      uri:
        url: "http://localhost:{{ host_port }}/readyz"
        status_code: 200
        timeout: 10
      register: readyz_check
      retries: 10
      delay: 3
      until: readyz_check.status == 200

    - name: Wait for /health to return 200 (DB connectivity)
      uri:
        url: "http://localhost:{{ host_port }}/health"
        status_code: 200
        timeout: 10
      register: health_check
      retries: 10
      delay: 3
      until: health_check.status == 200

    - name: Show health response
      debug:
        msg: "{{ health_check.json }}"

    - name: docker ps output
      command: docker ps --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Ports{{ '}}' }}"
      register: docker_ps
      changed_when: false

    - name: Show docker ps
      debug:
        msg: "{{ docker_ps.stdout_lines }}"
