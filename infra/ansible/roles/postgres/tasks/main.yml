---
- name: Install prerequisite packages for PGDG apt repository
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create /usr/share/postgresql-common/pgdg directory
  file:
    path: /usr/share/postgresql-common/pgdg
    state: directory
    mode: '0755'

- name: Download PGDG apt signing key
  get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
    mode: '0644'
    force: false

- name: Add PGDG apt repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg
    update_cache: true

- name: Install PostgreSQL {{ pg_version }}
  apt:
    name:
      - "postgresql-{{ pg_version }}"
      - "postgresql-client-{{ pg_version }}"
      - python3-psycopg2
    state: present
    update_cache: true

- name: Ensure PostgreSQL service is started and enabled
  systemd:
    name: postgresql
    state: started
    enabled: true

- name: Set listen_addresses to *
  lineinfile:
    path: "{{ pg_conf_dir }}/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = '*'"
  notify: restart postgresql

- name: Set wal_level = replica
  lineinfile:
    path: "{{ pg_conf_dir }}/postgresql.conf"
    regexp: "^#?wal_level"
    line: "wal_level = replica"
  notify: restart postgresql

- name: Set max_wal_senders = 10
  lineinfile:
    path: "{{ pg_conf_dir }}/postgresql.conf"
    regexp: "^#?max_wal_senders"
    line: "max_wal_senders = 10"
  notify: restart postgresql

- name: Set wal_keep_size = 1024
  lineinfile:
    path: "{{ pg_conf_dir }}/postgresql.conf"
    regexp: "^#?wal_keep_size"
    line: "wal_keep_size = 1024"
  notify: restart postgresql

- name: Set hot_standby = on
  lineinfile:
    path: "{{ pg_conf_dir }}/postgresql.conf"
    regexp: "^#?hot_standby"
    line: "hot_standby = on"
  notify: restart postgresql

- name: Allow replication connections in pg_hba.conf
  blockinfile:
    path: "{{ pg_conf_dir }}/pg_hba.conf"
    marker: "# {mark} ANSIBLE MANAGED — replication"
    block: |
      host    replication     {{ pg_replication_user }}      10.0.0.0/16         scram-sha-256
      host    all             all                            10.0.0.0/16         scram-sha-256
  notify: restart postgresql

- name: Flush handlers to apply config before primary/standby roles
  meta: flush_handlers
