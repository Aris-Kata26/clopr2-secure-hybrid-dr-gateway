apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: clopr2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
      - name: app
        image: acrb2clckatargwc.azurecr.io/clopr2-prototype-a:latest
        ports:
        - containerPort: 8000
        env:
        - name: DB_ENABLED
          value: "false"
        - name: APP_ENV
          value: "dev"
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "250m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
