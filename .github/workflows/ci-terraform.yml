name: ci-terraform

on:
  push:
    paths:
      - 'infra/terraform/**'
      - 'scripts/dr/*.sh'
      - '.github/workflows/ci-terraform.yml'
  pull_request:
    paths:
      - 'infra/terraform/**'
      - 'scripts/dr/*.sh'
      - '.github/workflows/ci-terraform.yml'

jobs:

  fmt:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: terraform fmt -check (recursive)
        run: terraform fmt -check -recursive infra/terraform

  validate:
    name: Terraform Validate — ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, dr-fce, swe-aks, onprem]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: terraform init -backend=false
        run: terraform -chdir=infra/terraform/envs/${{ matrix.env }} init -backend=false
      - name: terraform validate
        run: terraform -chdir=infra/terraform/envs/${{ matrix.env }} validate

  shellcheck:
    name: ShellCheck — DR Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (severity=error)
        # Only fail on errors; notes/warnings are informational.
        # Scripts use bash-specific syntax declared via #!/usr/bin/env bash.
        run: shellcheck --severity=error --shell=bash scripts/dr/*.sh
