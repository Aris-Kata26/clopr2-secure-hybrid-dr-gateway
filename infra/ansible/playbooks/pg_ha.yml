---
# ============================================================
# pg_ha.yml — On-prem PostgreSQL HA + Keepalived VIP
# ============================================================
# Order of execution:
#   1. Install & configure PG on both nodes (common base)
#   2. Set up primary-specific objects (replication user)
#   3. Set up standby (pg_basebackup + recovery)
#   4. Verify replication is running
#   5. Deploy Keepalived VIP on both nodes
# ============================================================

# ---- Step 1: Common PostgreSQL install on both pg nodes ----
- name: Install and configure PostgreSQL on all pg nodes
  hosts: pg_primary:pg_standby
  become: true
  roles:
    - postgres

# ---- Step 2: Primary-specific setup ----
- name: Configure PostgreSQL primary (replication user)
  hosts: pg_primary
  become: true
  roles:
    - postgres_primary

# ---- Step 3: Standby setup (pg_basebackup + standby.signal) ----
- name: Configure PostgreSQL standby (base backup + recovery)
  hosts: pg_standby
  become: true
  roles:
    - postgres_standby

# ---- Step 4: Verify replication end-to-end ----
- name: Verify streaming replication is active
  hosts: pg_primary
  become: true
  tasks:
    - name: Wait up to 30s for standby to connect
      shell: |
        for i in $(seq 1 15); do
          count=$(sudo -u postgres psql -tc "SELECT count(*) FROM pg_stat_replication;" | tr -d ' \n')
          [ "${count:-0}" -gt "0" ] && break
          sleep 2
        done
        echo "Final count: ${count:-0}"
      register: wait_repl
      changed_when: false

    - name: Show pg_stat_replication
      shell: sudo -u postgres psql -c "SELECT client_addr, state, sync_state, sent_lsn, replay_lsn FROM pg_stat_replication;"
      register: stat_repl
      changed_when: false

    - name: Print pg_stat_replication
      debug:
        msg: "{{ stat_repl.stdout }}"

    - name: Assert standby is connected
      shell: sudo -u postgres psql -tc "SELECT count(*) FROM pg_stat_replication;" | tr -d ' \n'
      register: repl_count
      changed_when: false
      failed_when: repl_count.stdout | trim | int == 0

# ---- Step 5: Keepalived VIP on both pg nodes ----
- name: Deploy Keepalived VIP
  hosts: pg_primary:pg_standby
  become: true
  roles:
    - keepalived

# ---- Step 6: Final status summary ----
- name: Final HA status summary
  hosts: pg_primary:pg_standby
  become: true
  tasks:
    - name: Show current IPs (check VIP assignment)
      shell: ip addr show eth0 | grep 'inet '
      register: ip_info
      changed_when: false

    - name: Print IP info
      debug:
        msg: "{{ inventory_hostname }}: {{ ip_info.stdout_lines }}"

    - name: Show keepalived state
      shell: systemctl status keepalived --no-pager | grep -E 'Active|MASTER|BACKUP'
      register: kv_state
      changed_when: false
      ignore_errors: true

    - name: Print keepalived state
      debug:
        msg: "{{ inventory_hostname }} keepalived: {{ kv_state.stdout_lines }}"
